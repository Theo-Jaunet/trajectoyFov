<div style="display: none" class="hiddenControls">
    <input id="videoInput" type="file" style="max-width: 400px" accept="video/*"/>
    <input id="trajectoryFile" type="file"/>
    <input id="mainBg" type="file" accept="image/*"/>
    <input id="waypointFile" style="display: none" type="file" accept="image/*"/>
    <input id="seaFile" type="file" accept="text/csv"/>
</div>

<div style="display: flex;border-bottom: 2px solid #333;width: 100vw;height: 50px;background-color: #424242">
    <h3 style="display: inline;font-weight:700;margin-left:10px;color: #eeeeee">TrajecStories</h3>

    <div style="justify-content: space-evenly;width: 80vw;margin-left: 60px;margin-top: 5px;display: flex"
         id="navButtonList">
        <button onclick="fakeVideo()">Import Video</button>
        <button onclick="fakeGpx()">Import GPX</button>
        <button onclick="fakeBg()">Import Background</button>
        <button onclick="">Import Data</button>
        <button onclick="fakeSea()">Import SeaRequestCSV</button>
    </div>

    <img style="position: absolute;right: 5px;margin-right:5px;margin-top:5px  ;height: 40px"
         src="assets/images/logo/logo.svg">
</div>

<div class="container" style="margin-top: 1%;width: 97vw;max-width: 100vw; ">

    <div style="display: flex;">
        <div style="width: 30vw;position:relative;">
            <video id="mainVideo" controls muted>
                <source id="mainSource" src="" type="video/mp4">
                Select a video to load
            </video>
            <canvas style="display: none" id="testStack">

            </canvas>

            <svg id="videoOverlay">

            </svg>

            <div>

                <div style="display: flex;width: 100%;justify-content: space-evenly">
                    <div class="displayOption SelectedOption" onclick="dispatchView(this,0)">Video</div>
                    <div class="displayOption" onclick="dispatchView(this,1)">Cube</div>
                    <div class="displayOption" onclick="dispatchView(this,2)">Slit</div>
                    <div class="displayOption" onclick="dispatchView(this,3)">Pyramid</div>
                </div>


                <!-- <div style="display: flex; ">
                     <label for="fpsRange"> Fps for Slits</label>
                     <p>1</p>
                     <input id="fpsRange" style="display: inline-block" type="range" min="0.25" max="5" step="0.25"
                            value="1"/>
                 </div>-->

            </div>
            <div style="display: inline-block">

            </div>
        </div>

        <!--    </div>-->

        <div style="width:65vw;margin-left:0.2vw ">
            <div style="position: absolute;margin-top: 3px;margin-left: 3px;z-index: 999;">
                <img onclick="strokeToggle()" id="strokeBtn" src="assets/images/pictos/stroke.png">
                <!--                    <img onclick="cropToggle()" id="cropBG" src="assets/images/pictos/crop.png">-->
                <img onclick="mapToggle()" id="mapToggle" src="assets/images/pictos/map.png">
                <div style="display: inline-block;">
                    <!--                    <label style="display: inline-block;" for="meshHeight">BandWidth</label>-->
                    <input style="width: 122px;margin-bottom: 4px" id="meshHeight" type="range" min="0" value="0.3"
                           max="1" step="0.05"/>
                </div>
            </div>

            <div style="margin-bottom: 0;border:  1px solid #555;border-radius: 5px;height: 54.5vh">
                <div id="map"></div>
                <canvas id="main" style="width: 100%; height: 100%">
                </canvas>

            </div>
        </div>

        <div id="sidebar" style="margin-left:0.1vw">
            <div><h5>Waypoints</h5></div>
            <div id="waypoints">

            </div>
            <div style="text-align: center; margin-top: 1%;display: flex; justify-content: center;align-content: center;float: right;width: 93%;
">
                <img id="moreLabel" style="width: 25px;cursor: pointer" src="assets/images/pictos/plus.png">
            </div>

        </div>

    </div>

    <div style="">
        <div style="position: absolute;margin-top: -15px">

        </div>
